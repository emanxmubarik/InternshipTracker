{% extends "base.html" %}

{% block title %}Add Application{% endblock %}

{% block content %}
<div class="card">
    <h1>Add New Application</h1>

    <form method="POST">
        <input type="text" name="company" placeholder="Company Name" required>
        <input type="text" name="role" placeholder="Role Title" required>

        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Internship">Internship</option>
            <option value="Extracurricular">Extracurricular</option>
        </select>

        <select name="status" required>
            <option value="">Select Status</option>
            <option value="Wishlist">Wishlist</option>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
        </select>

        <label>Applied Date</label>
        <input type="date" name="applied_date">

        <label>Deadline</label>
        <input type="date" name="deadline">

        <input type="url" name="job_link" placeholder="Job Link">

        <textarea name="notes" placeholder="Add notes here"></textarea>

        <button type="submit">Add Application</button>
    </form>
</div>
{% endblock %}
